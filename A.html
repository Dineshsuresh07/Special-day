<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to top, #000000, #050814, #0a0f2c);
  min-height: 100vh;
  color: #e0e0e0;
  text-align: center;
  padding-bottom: 100px;
}

/* ✨ Stars */
.star {
  position: absolute;
  width: 1.5px;
  height: 1.5px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 0.7; }
}

/* ✍️ Text */
.typing {
  width: 85%;
  margin: 10px auto;
  white-space: pre-line;
  border-right: 2px solid white;
  animation: blink 0.8s infinite;
  line-height: 1.5;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* 📦 Image Wrapper */
.image-box {
  position: relative;
  display: inline-block;
  margin: 15px auto;
}

/* ⬜ Image */
.image-box img {
  width: 230px;
  height: 230px;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,0.2);
}

/* 🎀 Ribbon on Image */
.ribbon {
  position: absolute;
  top: -10px;
  right: -10px;
  font-size: 40px;
  transform: rotate(-20deg);
}

/* 🎵 Music Card */
.music-card {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  max-width: 420px;
  background: #8b1d1d;
  border-radius: 15px;
  display: flex;
  align-items: center;
  padding: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

.music-card img {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  margin: 0;
}

.music-info {
  flex: 1;
  text-align: left;
  padding: 0 10px;
}

.music-title {
  font-size: 14px;
  font-weight: bold;
}

.music-artist {
  font-size: 12px;
  opacity: 0.8;
}

.play-btn {
  font-size: 20px;
  cursor: pointer;
  padding: 10px;
}

audio {
  display: none;
}
</style>
</head>

<body>

<!-- ✨ Stars -->
<script>
for (let i = 0; i < 100; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random()*100+"vh";
  s.style.left = Math.random()*100+"vw";
  document.body.appendChild(s);
}
</script>

<h1>Happiest Birthday Sahanaa...! 🎂</h1>

<div class="typing" id="text"></div>

<!-- 📦 Image with Ribbon -->
<div class="image-box">
  <img src="eyes.jpg">
  <div class="ribbon">🎀</div>
</div>

<!-- 🎵 Music Card -->
<div class="music-card">
  <img src="cover.jpg" alt="song">
  
  <div class="music-info">
    <div class="music-title">He will never leave me alone</div>
    <div class="music-artist">Arijit Singh</div>
  </div>

  <div class="play-btn" onclick="togglePlay()">▶️</div>
</div>

<audio id="audio">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const msg = `Again sorry for everything happened...!

"Wishing you joy, love & happiness on your special day"
Grace of Lord Shiva be with you!
- by your friend`;

let i = 0;
function type() {
  if(i < msg.length){
    document.getElementById("text").innerHTML += msg[i];
    i++;
    setTimeout(type, 40);
  }
}
type();

/* 🎵 Play Button */
let playing = false;
function togglePlay(){
  const audio = document.getElementById("audio");
  const btn = document.querySelector(".play-btn");

  if(!playing){
    audio.play();
    btn.innerHTML = "⏸️";
  } else {
    audio.pause();
    btn.innerHTML = "▶️";
  }
  playing = !playing;
}
</script>

</body>
</html>
